<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB_WEB</title>
    <link rel="stylesheet" href="css/css.css" />
  </head>
  <body>
    <div class="db_web_wrap">
      <div class="db_web_title">
        <strong>DB_WEB 게시판</strong>
        <p>바르고 고운말을 사용하도록 합시다.</p>
      </div>
      <div class="db_web_write_wrap">
        <div class="db_web_write">
          <form action="/create-post" class="info" method="post">
            <div class="title">
              <dl>
                <dt>제목</dt>
                <dd>
                  <input
                    type="text"
                    name="title"
                    id="title"
                    placeholder="제목 입력"
                  />
                </dd>
              </dl>
            </div>
            <div class="info">
              <dl>
                <dt>글쓴이</dt>
                <dd>
                  <input
                    type="text"
                    name="writer"
                    id="writer"
                    placeholder="글쓴이 입력"
                  />
                </dd>
              </dl>
            </div>
            <div class="cont">
              <textarea
                name="contents"
                id="contents"
                placeholder="내용 입력"
              ></textarea>
            </div>
            <div class="bt_wrap">
              <button type="submit" name="submit" class="on">등록</button>
              <a href="/main.html">취소</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
